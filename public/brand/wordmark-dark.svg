<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap');
      .wordmark {
        font-family: 'Cormorant Garamond', 'Times New Roman', serif;
        font-style: italic;
        font-weight: 500;
        font-size: 200px;
        letter-spacing: -2px;
        fill: #f4f1ec;
      }
      .dot {
        font-family: 'Cormorant Garamond', 'Times New Roman', serif;
        font-style: italic;
        font-weight: 500;
        font-size: 320px;
        fill: #c9a96e;
      }
    ]]></style>
  </defs>
  <rect width="1200" height="240" fill="#0c0a10"/>
  <text class="wordmark" x="40" y="180">lead thirteen</text>
  <text class="dot" x="990" y="200">.</text>
</svg>
